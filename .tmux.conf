# ══════════════════════════════════════════════════════════
# TMUX CONFIG — Professional setup with Neovim integration
# Copy to: ~/.tmux.conf
# ══════════════════════════════════════════════════════════

# ── Prefix ────────────────────────────────────────────────
# Change prefix from Ctrl-b to Ctrl-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General options ───────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # 24-bit color for Neovim
set -g mouse on                                    # Enable mouse
set -g base-index 1                                # Windows start at 1
setw -g pane-base-index 1                          # Panes start at 1
set -g renumber-windows on                         # Renumber windows on close
set -g history-limit 50000                         # Large scrollback
set -sg escape-time 0                              # No ESC delay (essential for Neovim!)
set -g focus-events on                             # Focus events for Neovim autocommands
set -g status-interval 5                           # Refresh status bar every 5s

# ── Seamless Neovim + Tmux pane navigation ────────────────
# vim-tmux-navigator: Ctrl-h/j/k/l moves between
# Neovim splits AND Tmux panes transparently
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# Copy mode — same seamless navigation
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ── Splits (intuitive keys) ──────────────────────────────
# | for vertical split, - for horizontal split
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window opens in current directory
bind c new-window -c "#{pane_current_path}"

# ── Resize panes ─────────────────────────────────────────
# Alt + h/j/k/l to resize (no prefix needed!)
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# ── Copy mode (vi style) ─────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# WSL2: Copy to Windows clipboard
if-shell -b 'test -n "$WSL_DISTRO_NAME"' \
    "bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'clip.exe'"

# Linux (Wayland): copy via wl-copy
if-shell -b 'test -z "$WSL_DISTRO_NAME" && command -v wl-copy >/dev/null' \
    "bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'"

# Linux (X11): copy via xclip
if-shell -b 'test -z "$WSL_DISTRO_NAME" && command -v xclip >/dev/null' \
    "bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -sel clipboard'"

# ── Reload config ────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Window navigation ────────────────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ── Status bar (Dracula PRO colors) ──────────────────────
set -g status-position bottom
set -g status-style 'bg=#282a36 fg=#f8f8f2'
set -g status-left '#[fg=#282a36,bg=#bd93f9,bold] #S '
set -g status-right '#[fg=#f8f8f2,bg=#44475a] %H:%M #[fg=#282a36,bg=#bd93f9,bold] #H '
set -g status-left-length 30
set -g status-right-length 50

# Active window
setw -g window-status-current-style 'fg=#282a36 bg=#50fa7b bold'
setw -g window-status-current-format ' #I:#W '

# Inactive window
setw -g window-status-style 'fg=#f8f8f2 bg=#44475a'
setw -g window-status-format ' #I:#W '

# Pane borders
set -g pane-border-style 'fg=#44475a'
set -g pane-active-border-style 'fg=#bd93f9'

# ── Sessionizer (ThePrimeagen style) ─────────────────────
# Ctrl-a f = fuzzy-find a project and switch to its tmux session
bind-key f display-popup -E -w 80% -h 80% "\
    find ~/Projects -mindepth 1 -maxdepth 2 -type d 2>/dev/null | \
    fzf --reverse --header='Switch project' | \
    xargs -I {} sh -c ' \
        session_name=\$(basename {}) && \
        tmux has-session -t \$session_name 2>/dev/null || \
        tmux new-session -d -s \$session_name -c {} && \
        tmux switch-client -t \$session_name \
    '"
